apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: netbox-credentials
  namespace: netbox
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: netbox-credentials
    creationPolicy: Owner
  data:
    # Chart projected volume expects these exact key names
    - secretKey: secret_key
      remoteRef:
        key: netbox
        property: secret_key
    - secretKey: password
      remoteRef:
        key: netbox
        property: admin_password
    - secretKey: api_token
      remoteRef:
        key: netbox
        property: admin_api_token
    - secretKey: email_password
      remoteRef:
        key: netbox
        property: email_password
    # PostgreSQL auth references
    - secretKey: db_password
      remoteRef:
        key: netbox
        property: db_password
    # Superuser env vars (chart expects 'username' and 'email' keys)
    - secretKey: username
      remoteRef:
        key: netbox
        property: admin_username
    - secretKey: email
      remoteRef:
        key: netbox
        property: admin_email
    - secretKey: admin_password
      remoteRef:
        key: netbox
        property: admin_password
    - secretKey: admin_api_token
      remoteRef:
        key: netbox
        property: admin_api_token
    - secretKey: admin_email
      remoteRef:
        key: netbox
        property: admin_email
    - secretKey: admin_username
      remoteRef:
        key: netbox
        property: admin_username
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: netbox-postgresql
  namespace: netbox
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: netbox-postgresql
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: netbox
        property: db_password
    - secretKey: postgres-password
      remoteRef:
        key: netbox
        property: db_password
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: netbox-valkey
  namespace: netbox
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: netbox-valkey
    creationPolicy: Owner
  data:
    - secretKey: valkey-password
      remoteRef:
        key: netbox
        property: redis_password
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: netbox-oidc
  namespace: netbox
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: netbox-oidc
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        oidc.yaml: |
          SOCIAL_AUTH_OIDC_KEY: "{{ .client_id }}"
          SOCIAL_AUTH_OIDC_SECRET: "{{ .client_secret }}"
          SOCIAL_AUTH_OIDC_ENDPOINT: "https://auth.${INTERNAL_DOMAIN}/realms/sentinel"
          SOCIAL_AUTH_OIDC_SCOPE:
            - openid
            - profile
            - email
            - roles
          SOCIAL_AUTH_REDIRECT_IS_HTTPS: true
          API_TOKEN_PEPPERS:
            1: "{{ .api_token_pepper }}"
  data:
    - secretKey: client_id
      remoteRef:
        key: keycloak/netbox
        property: client_id
    - secretKey: client_secret
      remoteRef:
        key: keycloak/netbox
        property: client_secret
    - secretKey: api_token_pepper
      remoteRef:
        key: netbox
        property: api_token_pepper
