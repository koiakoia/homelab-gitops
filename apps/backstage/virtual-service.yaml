---
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: backstage
  namespace: backstage
spec:
  hosts:
    - backstage.${INTERNAL_DOMAIN}
  gateways:
    - istio-ingress/sentinel-gateway
  http:
    - route:
        - destination:
            host: backstage.backstage.svc.cluster.local
            port:
              number: 7007
