---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: backstage-credentials
  namespace: backstage
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: backstage-credentials
    creationPolicy: Owner
  data:
    - secretKey: BACKEND_SECRET
      remoteRef:
        key: backstage
        property: backend_secret
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: backstage
        property: postgres_password
    - secretKey: POSTGRES_USER
      remoteRef:
        key: backstage
        property: postgres_user
    - secretKey: POSTGRES_HOST
      remoteRef:
        key: backstage
        property: postgres_host
    - secretKey: POSTGRES_PORT
      remoteRef:
        key: backstage
        property: postgres_port
    - secretKey: OIDC_CLIENT_ID
      remoteRef:
        key: keycloak/backstage
        property: client_id
    - secretKey: OIDC_CLIENT_SECRET
      remoteRef:
        key: keycloak/backstage
        property: client_secret
    - secretKey: GITLAB_TOKEN
      remoteRef:
        key: backstage
        property: gitlab_token
    - secretKey: MCP_TOKEN
      remoteRef:
        key: mcp
        property: backstage_mcp_token
    - secretKey: SESSION_SECRET
      remoteRef:
        key: backstage
        property: session_secret
    - secretKey: ARGOCD_AUTH_TOKEN
      remoteRef:
        key: backstage
        property: argocd_token
    - secretKey: GRAFANA_TOKEN
      remoteRef:
        key: backstage
        property: grafana_token
    - secretKey: VAULT_TOKEN
      remoteRef:
        key: backstage
        property: vault_token
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: backstage-postgresql
  namespace: backstage
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: backstage-postgresql
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: backstage
        property: postgres_password
    - secretKey: postgres-password
      remoteRef:
        key: backstage
        property: postgres_password
