apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: health-checker-matrix
  namespace: health-monitoring
  labels:
    app.kubernetes.io/name: health-checker
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: health-checker-matrix
    creationPolicy: Owner
  data:
    - secretKey: MATRIX_TOKEN
      remoteRef:
        key: matrix/bot
        property: token
    - secretKey: MATRIX_ROOM_ID
      remoteRef:
        key: matrix/rooms
        property: grafana
