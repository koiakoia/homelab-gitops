apiVersion: v1
kind: ServiceAccount
metadata:
  name: matrix-sa
  namespace: matrix
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: matrix-anyuid
  namespace: matrix
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:anyuid
subjects:
  - kind: ServiceAccount
    name: matrix-sa
    namespace: matrix
