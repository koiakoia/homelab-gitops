apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: matrix
  labels:
    security.sentinel/layer: network-policy
    security.sentinel/type: default-deny
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-synapse
  namespace: matrix
  labels:
    security.sentinel/layer: network-policy
spec:
  podSelector:
    matchLabels:
      app: synapse
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              network.openshift.io/policy-group: ingress
      ports:
        - port: 8008
          protocol: TCP
    # Allow Element Web to reach Synapse
    - from:
        - podSelector:
            matchLabels:
              app: element-web
      ports:
        - port: 8008
          protocol: TCP
    # Allow MAS to reach Synapse
    - from:
        - podSelector:
            matchLabels:
              app: mas
      ports:
        - port: 8008
          protocol: TCP
  egress:
    # PostgreSQL
    - to:
        - podSelector:
            matchLabels:
              app: matrix-postgresql
      ports:
        - port: 5432
          protocol: TCP
    # MAS
    - to:
        - podSelector:
            matchLabels:
              app: mas
      ports:
        - port: 8080
          protocol: TCP
    # DNS
    - to:
        - namespaceSelector: {}
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
        - port: 5353
          protocol: UDP
        - port: 5353
          protocol: TCP
    # Keycloak OIDC via Traefik (internal)
    - to:
        - ipBlock:
            cidr: ${PROXY_IP}/32
      ports:
        - port: 443
          protocol: TCP
---
