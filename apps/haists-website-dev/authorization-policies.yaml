---
# Default deny-all for haists-website-dev namespace
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: deny-all
  namespace: haists-website-dev
spec: {}
---
# Allow ingress from Istio IngressGateway to haists-website-dev
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-ingress-gateway
  namespace: haists-website-dev
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: haists-website-dev
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - cluster.local/ns/istio-ingress/sa/istio-ingressgateway
