---
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: haists-website-dev
  namespace: haists-website-dev
spec:
  hosts:
    - dev.${INTERNAL_DOMAIN}
  gateways:
    - istio-ingress/sentinel-gateway
  http:
    - route:
        - destination:
            host: haists-website-dev.haists-website-dev.svc.cluster.local
            port:
              number: 8080
