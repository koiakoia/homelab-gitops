---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: haists-website
  namespace: haists-website
  labels:
    app.kubernetes.io/name: haists-website
    app.kubernetes.io/instance: haists-website
    app.kubernetes.io/component: website
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: haists-website
      app.kubernetes.io/instance: haists-website
  template:
    metadata:
      labels:
        app.kubernetes.io/name: haists-website
        app.kubernetes.io/instance: haists-website
        app.kubernetes.io/component: website
      annotations:
        sidecar.istio.io/inject: "true"
    spec:
      serviceAccountName: haists-website
      containers:
        - name: haists-website
          image: harbor.${INTERNAL_DOMAIN}/sentinel/haists-website:7c13ec84
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - secretRef:
                name: haists-website-credentials
          env:
            - name: HW_MATRIX_BOT_URL
              value: "http://${OKD_NETWORK_GW}:9095"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          startupProbe:
            httpGet:
              path: /api/health
              port: 8080
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8080
            periodSeconds: 30
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
---
apiVersion: v1
kind: Service
metadata:
  name: haists-website
  namespace: haists-website
  labels:
    app.kubernetes.io/name: haists-website
    app.kubernetes.io/instance: haists-website
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
  selector:
    app.kubernetes.io/name: haists-website
    app.kubernetes.io/instance: haists-website
