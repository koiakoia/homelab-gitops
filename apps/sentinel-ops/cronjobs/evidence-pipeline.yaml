apiVersion: batch/v1
kind: CronJob
metadata:
  name: evidence-pipeline
  namespace: sentinel-ops
spec:
  schedule: "0 7 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 5
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 300
      template:
        metadata:
          annotations:
            sidecar.istio.io/inject: "false"
        spec:
          serviceAccountName: sentinel-ops-sa
          restartPolicy: Never
          containers:
            - name: evidence
              image: harbor.${INTERNAL_DOMAIN}/sentinel/sentinel-ops:v1
              command: ["/bin/bash", "/opt/sentinel-ops/evidence-pipeline.sh"]
              envFrom:
                - secretRef:
                    name: ops-gitlab-token
                - secretRef:
                    name: ops-minio-creds
                - secretRef:
                    name: ops-wazuh-creds
              volumeMounts:
                - name: scripts
                  mountPath: /opt/sentinel-ops
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 256Mi
          volumes:
            - name: scripts
              configMap:
                name: ops-scripts
                defaultMode: 0755
