apiVersion: v1
kind: ServiceAccount
metadata:
  name: seedbox-sa
  namespace: media
---
# NOTE: This RoleBinding alone is NOT sufficient for OKD SCC admission.
# The SA must also be listed in the SCC's 'users' field directly.
# See scc-linuxserver-io.yaml (ArgoCD-managed alongside this app).
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: seedbox-linuxserver-io-scc
  namespace: media
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:linuxserver-io
subjects:
  - kind: ServiceAccount
    name: seedbox-sa
    namespace: media
