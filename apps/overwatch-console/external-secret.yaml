---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: overwatch-console-credentials
  namespace: overwatch-console
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: overwatch-console-credentials
    creationPolicy: Owner
  data:
    - secretKey: OC_OIDC_CLIENT_SECRET
      remoteRef:
        key: keycloak/overwatch-console
        property: client_secret
    - secretKey: OC_PROXMOX_TOKEN_ID
      remoteRef:
        key: proxmox
        property: api_token_id
    - secretKey: OC_PROXMOX_TOKEN_SECRET
      remoteRef:
        key: proxmox
        property: api_token_secret
    - secretKey: OC_VAULT_TOKEN
      remoteRef:
        key: vault/root-token
        property: token
    - secretKey: OC_WAZUH_USER
      remoteRef:
        key: wazuh/api
        property: username
    - secretKey: OC_WAZUH_PASSWORD
      remoteRef:
        key: wazuh/api
        property: password
    - secretKey: OC_WAZUH_INDEXER_USER
      remoteRef:
        key: wazuh/indexer
        property: username
    - secretKey: OC_WAZUH_INDEXER_PASSWORD
      remoteRef:
        key: wazuh/indexer
        property: password
    - secretKey: OC_ARGOCD_TOKEN
      remoteRef:
        key: mcp
        property: argocd_api_token
    - secretKey: OC_GITLAB_TOKEN
      remoteRef:
        key: gitlab
        property: pat
    - secretKey: OC_KEYCLOAK_ADMIN_USER
      remoteRef:
        key: keycloak/admin
        property: username
    - secretKey: OC_KEYCLOAK_ADMIN_PASSWORD
      remoteRef:
        key: keycloak/admin
        property: password
    - secretKey: OC_CROWDSEC_API_KEY
      remoteRef:
        key: crowdsec
        property: bouncer_api_key
