---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: overwatch-console
  namespace: overwatch-console
---
apiVersion: security.openshift.io/v1
kind: SecurityContextConstraints
metadata:
  name: overwatch-console-anyuid
allowPrivilegedContainer: false
runAsUser:
  type: MustRunAs
  uid: 1001
seLinuxContext:
  type: MustRunAs
fsGroup:
  type: RunAsAny
supplementalGroups:
  type: RunAsAny
volumes:
  - configMap
  - downwardAPI
  - emptyDir
  - projected
  - secret
users:
  - system:serviceaccount:overwatch-console:overwatch-console
---
# ClusterRole for read-only access to namespaces, pods, and nodes
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: overwatch-console-reader
rules:
  - apiGroups: [""]
    resources: ["namespaces", "pods", "nodes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: overwatch-console-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: overwatch-console-reader
subjects:
  - kind: ServiceAccount
    name: overwatch-console
    namespace: overwatch-console
