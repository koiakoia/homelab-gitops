---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: overwatch-console
  namespace: overwatch-console
  labels:
    app.kubernetes.io/name: overwatch-console
    app.kubernetes.io/instance: overwatch-console
    app.kubernetes.io/component: dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: overwatch-console
      app.kubernetes.io/instance: overwatch-console
  template:
    metadata:
      labels:
        app.kubernetes.io/name: overwatch-console
        app.kubernetes.io/instance: overwatch-console
        app.kubernetes.io/component: dashboard
      annotations:
        sidecar.istio.io/inject: "true"
        secret.reloader.stakater.com/reload: "overwatch-console-credentials"
    spec:
      serviceAccountName: overwatch-console
      containers:
        - name: overwatch-console
          image: harbor.${INTERNAL_DOMAIN}/sentinel/overwatch-console:d859574
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - secretRef:
                name: overwatch-console-credentials
          env:
            - name: OC_AUTH_DISABLED
              value: "false"
            - name: OC_ALLOWED_CLIENTS
              value: "haists-website"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /api/health
              port: 8080
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8080
            periodSeconds: 30
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
---
apiVersion: v1
kind: Service
metadata:
  name: overwatch-console
  namespace: overwatch-console
  labels:
    app.kubernetes.io/name: overwatch-console
    app.kubernetes.io/instance: overwatch-console
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
  selector:
    app.kubernetes.io/name: overwatch-console
    app.kubernetes.io/instance: overwatch-console
