---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: plane-web
  namespace: plane
  annotations:
    haproxy.router.openshift.io/timeout: 60s
spec:
  host: plane.${INTERNAL_DOMAIN}
  path: /
  to:
    kind: Service
    name: plane-web
    weight: 100
  port:
    targetPort: 3000
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: plane-api
  namespace: plane
spec:
  host: plane.${INTERNAL_DOMAIN}
  path: /api
  to:
    kind: Service
    name: plane-api
    weight: 100
  port:
    targetPort: 8000
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
