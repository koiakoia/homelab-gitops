apiVersion: apps/v1
kind: Deployment
metadata:
  name: plane-postgresql
  namespace: plane
  labels:
    app.kubernetes.io/name: postgresql
    app.kubernetes.io/instance: plane
    app.kubernetes.io/component: database
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgresql
      app.kubernetes.io/instance: plane
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgresql
        app.kubernetes.io/instance: plane
        app.kubernetes.io/component: database
    spec:
      containers:
        - name: postgresql
          image: harbor.${INTERNAL_DOMAIN}/sentinel/postgres:15.7-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: plane
            - name: POSTGRES_USER
              value: plane
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: plane-postgresql
                  key: password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: postgresql-data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          startupProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U plane -d plane
            failureThreshold: 360
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U plane -d plane
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U plane -d plane
            periodSeconds: 10
      volumes:
        - name: postgresql-data
          persistentVolumeClaim:
            claimName: plane-postgresql-data
