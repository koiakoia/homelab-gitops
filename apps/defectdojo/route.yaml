---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: defectdojo
  namespace: defectdojo
spec:
  host: defectdojo.${INTERNAL_DOMAIN}
  to:
    kind: Service
    name: defectdojo-django
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
