---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: defectdojo-credentials
  namespace: defectdojo
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: defectdojo
    creationPolicy: Owner
  data:
    - secretKey: DD_SECRET_KEY
      remoteRef:
        key: defectdojo
        property: secret_key
    - secretKey: DD_ADMIN_PASSWORD
      remoteRef:
        key: defectdojo
        property: admin_password
    - secretKey: DD_CREDENTIAL_AES_256_KEY
      remoteRef:
        key: defectdojo
        property: credential_aes_256_key
    - secretKey: METRICS_HTTP_AUTH_PASSWORD
      remoteRef:
        key: defectdojo
        property: metrics_http_auth_password
    - secretKey: DD_DATABASE_PASSWORD
      remoteRef:
        key: defectdojo
        property: db_password
