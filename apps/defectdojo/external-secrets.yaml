        property: public_key
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: harbor-pull-secret
  namespace: defectdojo
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: harbor-pull-secret
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {
            "auths": {
              "harbor.${INTERNAL_DOMAIN}": {
                "auth": "{{ printf "admin:%s" .password | b64enc }}"
              }
            }
          }
  data:
    - secretKey: password
      remoteRef:
        key: harbor
        property: admin_password
