---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: defectdojo-postgresql
  namespace: defectdojo
  labels:
    app.kubernetes.io/name: postgresql
    app.kubernetes.io/instance: defectdojo
    app.kubernetes.io/component: database
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgresql
      app.kubernetes.io/instance: defectdojo
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgresql
        app.kubernetes.io/instance: defectdojo
        app.kubernetes.io/component: database
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      serviceAccountName: defectdojo-postgresql
      containers:
        - name: postgresql
          image: harbor.${INTERNAL_DOMAIN}/sentinel/postgres:16.8
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: defectdojo
            - name: POSTGRES_USER
              value: defectdojo
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: defectdojo-postgresql
                  key: password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: postgresql-data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U defectdojo -d defectdojo
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U defectdojo -d defectdojo
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 5
      volumes:
        - name: postgresql-data
          persistentVolumeClaim:
            claimName: defectdojo-postgresql-data
