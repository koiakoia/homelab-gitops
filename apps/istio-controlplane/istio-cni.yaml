---
apiVersion: sailoperator.io/v1
kind: IstioCNI
metadata:
  name: default
spec:
  version: v1.28.3
  namespace: istio-cni
  values:
    cni:
      cniConfDir: /etc/cni/multus/net.d
      cniBinDir: /var/lib/cni/bin
      resources:
        requests:
          cpu: 10m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 128Mi
      excludeNamespaces:
        - istio-system
        - istio-cni
        - kube-system
        - openshift-operators
        - openshift-gitops
