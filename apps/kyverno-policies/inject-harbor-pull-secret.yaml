apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: inject-harbor-pull-secret
  annotations:
    policies.kyverno.io/title: Inject Harbor Pull Secret
    policies.kyverno.io/category: Best Practices
    policies.kyverno.io/severity: medium
    policies.kyverno.io/description: >-
      Injects harbor-pull-secret as an imagePullSecret into pods
      in namespaces that pull from the private Harbor registry.
      Required after making the Harbor sentinel project private (SEC-19).
spec:
  rules:
    - name: add-harbor-pull-secret
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - backstage
                - defectdojo
                - falco-system
                - monitoring
                - haists-website
                - homepage
                - keycloak
                - matrix
                - media
                - netbox
                - overwatch-console
                - pangolin-internal
                - plane
                - reloader
                - sentinel-ops
                - harbor
      mutate:
        patchStrategicMerge:
          spec:
            imagePullSecrets:
              - name: harbor-pull-secret
