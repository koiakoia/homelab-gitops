---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ntfy
  namespace: health-monitoring
  labels:
    app.kubernetes.io/name: ntfy
    app.kubernetes.io/instance: ntfy
    app.kubernetes.io/component: notifications
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ntfy
      app.kubernetes.io/instance: ntfy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ntfy
        app.kubernetes.io/instance: ntfy
        app.kubernetes.io/component: notifications
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: ntfy
          image: harbor.${INTERNAL_DOMAIN}/sentinel/ntfy:v2.18.0
          args:
            - serve
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          volumeMounts:
            - name: cache
              mountPath: /var/cache/ntfy
            - name: config
              mountPath: /etc/ntfy
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          startupProbe:
            httpGet:
              path: /v1/health
              port: 8080
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /v1/health
              port: 8080
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /v1/health
              port: 8080
            periodSeconds: 30
      volumes:
        - name: cache
          persistentVolumeClaim:
            claimName: ntfy-cache
        - name: config
          configMap:
            name: ntfy-config
---
apiVersion: v1
kind: Service
metadata:
  name: ntfy
  namespace: health-monitoring
  labels:
    app.kubernetes.io/name: ntfy
    app.kubernetes.io/instance: ntfy
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
  selector:
    app.kubernetes.io/name: ntfy
    app.kubernetes.io/instance: ntfy
