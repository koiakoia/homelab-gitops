---
# Istio Gateway for meshed services
# Traefik terminates TLS, so IngressGateway accepts plain HTTP
# Traffic flow: Traefik (TLS) -> HAProxy :8080 -> IngressGateway :8080 -> mTLS -> Pod
apiVersion: networking.istio.io/v1
kind: Gateway
metadata:
  name: sentinel-gateway
  namespace: istio-ingress
spec:
  selector:
    istio: ingressgateway
  servers:
    - port:
        number: 8080
        name: http
        protocol: HTTP
      hosts:
        - "*.${INTERNAL_DOMAIN}"
        - "www.${DOMAIN}"
