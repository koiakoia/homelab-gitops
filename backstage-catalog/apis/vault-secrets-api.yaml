---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: vault-secrets-api
  description: HashiCorp Vault KV v2 Secrets Engine API for secret storage and retrieval
  links:
    - url: https://vault.${INTERNAL_DOMAIN}/ui
      title: Vault UI
      icon: dashboard
  tags:
    - secrets
    - security
    - vault
    - overwatch
spec:
  type: openapi
  lifecycle: production
  owner: platform-team
  system: sentinel-platform
  definition: |
    openapi: 3.0.0
    info:
      title: Vault KV v2 Secrets Engine
      version: "1.21.2"
      description: HashiCorp Vault Key-Value v2 secrets engine at secret/
    servers:
      - url: https://vault.${INTERNAL_DOMAIN}/v1
    paths:
      /secret/data/{path}:
        get:
          summary: Read secret
          parameters:
            - name: path
              in: path
              required: true
              schema:
                type: string
        post:
          summary: Create or update secret
      /secret/metadata/{path}:
        get:
          summary: Read secret metadata
