---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: unifi-network-api
  description: UniFi Network Application API v10.1.84 on UCG-Fiber controller
  annotations:
    gitlab.com/project-slug: ${GITLAB_NAMESPACE}/sentinel-unifi
  tags:
    - networking
    - unifi
    - overwatch
spec:
  type: openapi
  lifecycle: production
  owner: platform-team
  system: sentinel-platform
  definition: |
    openapi: 3.0.0
    info:
      title: UniFi Network API
      version: "10.1.84"
      description: UniFi Network Integration API on UCG-Fiber at ${GATEWAY_IP}
    servers:
      - url: https://${GATEWAY_IP}/proxy/network/integration/v1
    paths:
      /sites:
        get:
          summary: List all sites
      /devices:
        get:
          summary: List network devices
      /clients:
        get:
          summary: List connected clients
