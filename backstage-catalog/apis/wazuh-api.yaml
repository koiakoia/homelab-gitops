---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: wazuh-api
  description: Wazuh REST API for SIEM management, agent control, and rule queries
  links:
    - url: https://wazuh.${INTERNAL_DOMAIN}
      title: Wazuh Dashboard
      icon: dashboard
  tags:
    - siem
    - security
    - overwatch
spec:
  type: openapi
  lifecycle: production
  owner: platform-team
  system: sentinel-platform
  definition: |
    openapi: 3.0.0
    info:
      title: Wazuh API
      version: "4.14.1"
      description: Wazuh SIEM API - 9 agents, 8616 rules (77+ custom)
    servers:
      - url: https://${WAZUH_IP}:55000
    paths:
      /agents:
        get:
          summary: List all agents
      /rules:
        get:
          summary: List rules
      /security/rules:
        get:
          summary: List security rules
