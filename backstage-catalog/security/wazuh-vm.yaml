---
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: wazuh-server
  description: Wazuh SIEM with 9 agents, 77+ custom rules, FIM, and drift detection
  annotations:
    backstage.io/techdocs-ref: "url:http://${GITLAB_IP}/${GITLAB_NAMESPACE}/sentinel-iac/-/tree/main/techdocs/wazuh"
  links:
    - url: https://wazuh.${INTERNAL_DOMAIN}
      title: Wazuh Dashboard
      icon: dashboard
  tags:
    - siem
    - security
    - monitoring
    - vm-service
    - overwatch
spec:
  type: vm
  lifecycle: production
  owner: platform-team
  system: sentinel-platform
  dependsOn:
    - resource:proxmox-proxmox-node-2
  providesApis:
    - wazuh-api
