---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: external-secrets-operator
  description: External Secrets Operator (v0.11.0 via OLM) syncing Vault secrets to Kubernetes
  annotations:
    backstage.io/kubernetes-label-selector: app.kubernetes.io/name=external-secrets
    backstage.io/kubernetes-namespace: external-secrets
    gitlab.com/project-slug: ${GITLAB_NAMESPACE}/overwatch-gitops
  tags:
    - operator
    - secrets
    - vault
    - overwatch
spec:
  type: service
  lifecycle: production
  owner: platform-team
  system: sentinel-platform
  dependsOn:
    - resource:vault-server
