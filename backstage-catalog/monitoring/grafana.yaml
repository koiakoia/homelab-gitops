---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: grafana
  description: Observability dashboards and alerting platform with 11 dashboards
  annotations:
    backstage.io/kubernetes-label-selector: app.kubernetes.io/name=grafana
    backstage.io/kubernetes-namespace: monitoring
    backstage.io/techdocs-ref: "dir:../../techdocs/grafana"
    argocd/app-name: grafana
    gitlab.com/project-slug: ${GITLAB_NAMESPACE}/overwatch-gitops
    grafana/dashboard-url: https://grafana.${INTERNAL_DOMAIN}
  links:
    - url: https://grafana.${INTERNAL_DOMAIN}
      title: Grafana Dashboard
      icon: dashboard
  tags:
    - monitoring
    - observability
    - dashboards
    - overwatch
spec:
  type: service
  lifecycle: production
  owner: platform-team
  system: sentinel-platform
  dependsOn:
    - component:thanos-querier
    - component:keycloak
  providesApis:
    - grafana-api
