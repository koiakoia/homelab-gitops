---
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: proxmox-cluster
  description: Proxmox VE cluster (3 hosts) providing compute, storage, and networking
  links:
    - url: https://${PROXMOX_NODE1_IP}:8006
      title: pve Console
      icon: dashboard
    - url: https://${PROXMOX_NODE2_IP}:8006
      title: proxmox-node-2 Console
      icon: web
    - url: https://${PROXMOX_NODE3_IP}:8006
      title: proxmox-node-3 Console
      icon: web
    - url: https://${DNS_IP}
      title: pve iDRAC (R440, 14G)
      icon: cloud
    - url: https://${HAPROXY_IP}
      title: proxmox-node-2 iDRAC (7920, 14G)
      icon: cloud
    - url: https://${SERVICE_IP_202}
      title: proxmox-node-3 iDRAC (R720xd, 12G)
      icon: cloud
  tags:
    - hypervisor
    - proxmox
    - infrastructure
    - overwatch
spec:
  type: compute-cluster
  lifecycle: production
  owner: platform-team
  system: sentinel-platform
---
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: proxmox-pve
  description: "Proxmox host pve: 32 CPU, 62GB RAM (iac-control, gitlab, pangolin-proxy)"
  links:
    - url: https://${PROXMOX_NODE1_IP}:8006
      title: Proxmox Console
      icon: dashboard
    - url: https://${DNS_IP}
      title: iDRAC (PowerEdge R440, 14G)
      icon: cloud
  tags:
    - hypervisor
    - proxmox
    - overwatch
spec:
  type: hypervisor
  lifecycle: production
  owner: platform-team
  system: sentinel-platform
  dependsOn:
    - resource:proxmox-cluster
---
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: proxmox-proxmox-node-2
  description: "Proxmox host proxmox-node-2: 36 CPU, 125GB RAM (vault, wazuh, OKD masters)"
  links:
    - url: https://${PROXMOX_NODE2_IP}:8006
      title: Proxmox Console
      icon: dashboard
    - url: https://${HAPROXY_IP}
      title: iDRAC (Precision 7920 Rack, 14G)
      icon: cloud
  tags:
    - hypervisor
    - proxmox
    - overwatch
spec:
  type: hypervisor
  lifecycle: production
  owner: platform-team
  system: sentinel-platform
  dependsOn:
    - resource:proxmox-cluster
---
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: proxmox-proxmox-node-3
  description: "Proxmox host proxmox-node-3: 32 CPU, 125GB RAM (seedbox, minio LXCs)"
  links:
    - url: https://${PROXMOX_NODE3_IP}:8006
      title: Proxmox Console
      icon: dashboard
    - url: https://${SERVICE_IP_202}
      title: iDRAC (PowerEdge R720xd, 12G)
      icon: cloud
  tags:
    - hypervisor
    - proxmox
    - overwatch
spec:
  type: hypervisor
  lifecycle: production
  owner: platform-team
  system: sentinel-platform
  dependsOn:
    - resource:proxmox-cluster
