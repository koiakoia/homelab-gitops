---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: argocd
  description: GitOps continuous delivery platform managing all OKD workloads via app-of-apps
  annotations:
    backstage.io/techdocs-ref: "url:http://${GITLAB_IP}/${GITLAB_NAMESPACE}/overwatch-gitops/-/tree/main/techdocs/argocd"
    backstage.io/kubernetes-label-selector: app.kubernetes.io/name=argocd-server
    backstage.io/kubernetes-namespace: openshift-gitops
    argocd/app-name: openshift-gitops
    gitlab.com/project-slug: ${GITLAB_NAMESPACE}/overwatch-gitops
  links:
    - url: https://argocd.${INTERNAL_DOMAIN}
      title: ArgoCD Dashboard
      icon: dashboard
  tags:
    - gitops
    - cd
    - deployment
    - overwatch
spec:
  type: service
  lifecycle: production
  owner: platform-team
  system: sentinel-platform
  dependsOn:
    - component:keycloak
    - component:external-secrets-operator
  providesApis:
    - argocd-api
