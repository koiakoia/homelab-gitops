# External Secrets config includes ClusterSecretStore (cluster-scoped)
# and OperatorConfig in external-secrets namespace (unmanaged by ArgoCD).
# Manifests in apps/external-secrets/ are applied via: oc apply -f apps/external-secrets/
#
# ArgoCD Application below is kept as reference but NOT applied:
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets-config-reference
  namespace: openshift-gitops
  annotations:
    sentinel.${DOMAIN}/managed-by: oc-apply
    sentinel.${DOMAIN}/note: >-
      Reference only. ClusterSecretStore is cluster-scoped and external-secrets
      namespace is not managed by namespace-scoped ArgoCD.
spec:
  project: default
  source:
    repoURL: http://${GITLAB_IP}/${GITLAB_NAMESPACE}/overwatch-gitops.git
    targetRevision: main
    path: apps/external-secrets
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
