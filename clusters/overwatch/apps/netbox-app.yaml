apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: netbox
  namespace: openshift-gitops
spec:
  project: default
  sources:
    - repoURL: https://charts.netbox.oss.netboxlabs.com/
      chart: netbox
      targetRevision: 7.4.8
      helm:
        valueFiles:
          - $values/clusters/overwatch/apps/netbox/values.yaml
    - repoURL: http://${GITLAB_IP}/${GITLAB_NAMESPACE}/overwatch-gitops.git
      targetRevision: main
      ref: values
    - repoURL: http://${GITLAB_IP}/${GITLAB_NAMESPACE}/overwatch-gitops.git
      targetRevision: main
      path: apps/netbox
  destination:
    server: https://kubernetes.default.svc
    namespace: netbox
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
