# NetBox Helm values for OKD deployment
# Chart: netbox-community/netbox v7.4.8
# OKD: All security contexts DISABLED — let OpenShift manage UID/GID via anyuid SCC

# -- Allow non-Bitnami images in bundled subcharts (Valkey)
# Bitnami charts reject non-standard images by default. Our Harbor-mirrored
# image is identical content, just re-tagged for supply chain security.
global:
  security:
    allowInsecureImages: true

# -- Image overrides: pull from Harbor instead of public registries
image:
  registry: harbor.${INTERNAL_DOMAIN}
  repository: sentinel/netbox
  tag: v4.5.3
  pullPolicy: IfNotPresent

# -- Use pre-created ServiceAccount with anyuid SCC
serviceAccount:
  create: false
  name: netbox

# -- NetBox superuser configuration (keys: password, api_token in secret)
superuser:
  name: admin
  email: admin@${DOMAIN}
  existingSecret: netbox-credentials

# -- Django SECRET_KEY from ESO-managed secret
existingSecret: netbox-credentials
existingSecretKey: secret_key

# -- Disable Ingress (using OKD Route instead)
ingress:
  enabled: false

# -- NetBox application settings
allowedHosts:
  - netbox.${INTERNAL_DOMAIN}
  - localhost

# -- CSRF trusted origins (required for proxy/ingress)
csrf:
  trustedOrigins:
    - "https://netbox.${INTERNAL_DOMAIN}"

loginRequired: true

# -- OIDC SSO via Keycloak
remoteAuth:
  enabled: true
  backends:
    - social_core.backends.open_id_connect.OpenIdConnectAuth
  autoCreateUser: true
  autoCreateGroups: true
  groupSyncEnabled: true
  superuserGroups:
    - admin
  staffGroups:
    - operator

# -- Mount OIDC secret as additional config (contains client_id/secret)
extraConfig:
  - secret:
      secretName: netbox-oidc

metricsEnabled: true

# -- Persistence for media uploads
persistence:
  enabled: true
  storageClass: nfs-storage
  accessMode: ReadWriteOnce
  size: 5Gi

# -- DISABLE all security contexts for OKD compatibility
podSecurityContext:
  enabled: false

securityContext:
  enabled: false

init:
  securityContext:
    enabled: false

# -- Resource requests and limits
resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: "2"
    memory: 2Gi

# -- Override liveness probe (default checks nginx Unit endpoint, but v4.5 uses granian)
customLivenessProbe:
  httpGet:
    path: /login/
    port: http
  initialDelaySeconds: 30
  periodSeconds: 30
  timeoutSeconds: 10
  failureThreshold: 3

# -- Startup probe: allow long startup (migrations, search index build)
startupProbe:
  enabled: true
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 10
  failureThreshold: 100

# -- Readiness probe: increase timeout for cold starts
readinessProbe:
  enabled: true
  initialDelaySeconds: 0
  periodSeconds: 10
  timeoutSeconds: 10
  failureThreshold: 3

# -- Housekeeping CronJob
housekeeping:
  enabled: true
  schedule: "0 4 * * *"
  podSecurityContext:
    enabled: false
  securityContext:
    enabled: false
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# -- Worker
worker:
  podSecurityContext:
    enabled: false
  securityContext:
    enabled: false
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  waitForBackend:
    enabled: false
    containerSecurityContext:
      enabled: false

# -- Enable Istio sidecar injection for mTLS mesh
podAnnotations:
  sidecar.istio.io/inject: "true"

# -- PostgreSQL: DISABLED bundled subchart, using raw manifests instead
# Raw manifests in apps/netbox/postgresql-*.yaml (official postgres:16 image)
postgresql:
  enabled: false

# -- External database (points to our raw PostgreSQL deployment)
externalDatabase:
  host: netbox-postgresql
  port: 5432
  database: netbox
  username: netbox
  existingSecretName: netbox-postgresql
  existingSecretKey: password

# -- Valkey (Redis) subchart (bundled)
# NOTE: global.security.allowInsecureImages required because Bitnami charts
# reject non-Bitnami images by default. Our Harbor-mirrored image is identical.
valkey:
  enabled: true
  image:
    registry: harbor.${INTERNAL_DOMAIN}
    repository: sentinel/valkey
    tag: "9.0.2"
  auth:
    enabled: true
    existingSecret: netbox-valkey
    existingSecretPasswordKey: valkey-password
  master:
    persistence:
      enabled: true
      storageClass: nfs-storage
      size: 2Gi
    podSecurityContext:
      enabled: false
    containerSecurityContext:
      enabled: false
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
  replica:
    replicaCount: 0

# -- Tasks and caching databases (Valkey endpoints)
tasksDatabase:
  database: 0

cachingDatabase:
  database: 1
