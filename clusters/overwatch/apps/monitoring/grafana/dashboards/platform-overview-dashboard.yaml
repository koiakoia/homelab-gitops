apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-platform-overview
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    argocd.argoproj.io/sync-options: ServerSideApply=true
data:
  platform-overview.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": { "type": "grafana", "uid": "-- Grafana --" },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "id": 100,
          "title": "Cluster Health",
          "type": "row"
        },
        {
          "id": 1,
          "title": "OKD Nodes Ready",
          "type": "stat",
          "gridPos": { "h": 6, "w": 4, "x": 0, "y": 1 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "targets": [
            {
              "expr": "count(kube_node_status_condition{condition=\"Ready\",status=\"true\"})",
              "legendFormat": "Ready",
              "refId": "A",
              "instant": true
            },
            {
              "expr": "count(kube_node_info)",
              "legendFormat": "Total",
              "refId": "B",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 2 },
                  { "color": "green", "value": 3 }
                ]
              },
              "color": { "mode": "thresholds" }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none"
          }
        },
        {
          "id": 2,
          "title": "Total Pods",
          "type": "stat",
          "gridPos": { "h": 6, "w": 4, "x": 4, "y": 1 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "targets": [
            {
              "expr": "count(kube_pod_info)",
              "legendFormat": "Pods",
              "refId": "A",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "blue", "value": null }
                ]
              },
              "color": { "mode": "thresholds" }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none"
          }
        },
        {
          "id": 3,
          "title": "Pod Count by Namespace",
          "type": "barchart",
          "gridPos": { "h": 6, "w": 16, "x": 8, "y": 1 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "targets": [
            {
              "expr": "topk(10, count by (namespace)(kube_pod_info))",
              "legendFormat": "{{namespace}}",
              "refId": "A",
              "instant": true,
              "format": "table"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisBorderShow": false,
                "fillOpacity": 80,
                "gradientMode": "none",
                "lineWidth": 1
              }
            },
            "overrides": []
          },
          "options": {
            "barWidth": 0.7,
            "groupWidth": 0.7,
            "legend": { "displayMode": "list", "placement": "bottom" },
            "orientation": "horizontal",
            "tooltip": { "mode": "single", "sort": "none" },
            "xTickLabelRotation": 0
          },
          "transformations": [
            {
              "id": "organize",
              "options": {
                "excludeByName": { "Time": true },
                "renameByName": { "namespace": "Namespace", "Value": "Pods" }
              }
            },
            {
              "id": "sortBy",
              "options": {
                "fields": {},
                "sort": [{ "field": "Pods", "desc": true }]
              }
            }
          ]
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 7 },
          "id": 101,
          "title": "ArgoCD",
          "type": "row"
        },
        {
          "id": 4,
          "title": "ArgoCD Application Status",
          "type": "table",
          "gridPos": { "h": 8, "w": 14, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "targets": [
            {
              "expr": "argocd_app_info",
              "legendFormat": "",
              "refId": "A",
              "instant": true,
              "format": "table"
            }
          ],
          "fieldConfig": {
            "defaults": {},
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "sync_status" },
                "properties": [
                  { "id": "displayName", "value": "Sync Status" },
                  {
                    "id": "custom.displayMode",
                    "value": "color-background"
                  },
                  {
                    "id": "mappings",
                    "value": [
                      { "type": "value", "options": { "Synced": { "text": "Synced", "color": "green" }, "OutOfSync": { "text": "OutOfSync", "color": "red" }, "Unknown": { "text": "Unknown", "color": "yellow" } } }
                    ]
                  }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "health_status" },
                "properties": [
                  { "id": "displayName", "value": "Health" },
                  {
                    "id": "custom.displayMode",
                    "value": "color-background"
                  },
                  {
                    "id": "mappings",
                    "value": [
                      { "type": "value", "options": { "Healthy": { "text": "Healthy", "color": "green" }, "Degraded": { "text": "Degraded", "color": "red" }, "Progressing": { "text": "Progressing", "color": "yellow" }, "Missing": { "text": "Missing", "color": "orange" }, "Suspended": { "text": "Suspended", "color": "blue" } } }
                    ]
                  }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "name" },
                "properties": [
                  { "id": "displayName", "value": "Application" }
                ]
              }
            ]
          },
          "options": {
            "showHeader": true,
            "sortBy": [{ "displayName": "Application", "desc": false }]
          },
          "transformations": [
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "Time": true,
                  "Value": true,
                  "__name__": true,
                  "instance": true,
                  "job": true,
                  "namespace": true,
                  "dest_namespace": true,
                  "dest_server": true,
                  "operation": true,
                  "project": true,
                  "repo": true,
                  "autosync_enabled": true
                },
                "indexByName": {
                  "name": 0,
                  "sync_status": 1,
                  "health_status": 2
                }
              }
            }
          ]
        },
        {
          "id": 5,
          "title": "ArgoCD Sync Failures",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 10, "x": 14, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "targets": [
            {
              "expr": "sum by (name)(rate(argocd_app_sync_total{phase=\"Error\"}[5m]))",
              "legendFormat": "{{name}}",
              "refId": "A"
            },
            {
              "expr": "sum by (name)(rate(argocd_app_sync_total{phase=\"Failed\"}[5m]))",
              "legendFormat": "{{name}} (Failed)",
              "refId": "B"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth",
                "fillOpacity": 15,
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "auto",
                "spanNulls": false,
                "stacking": { "mode": "none" },
                "gradientMode": "scheme"
              },
              "color": { "mode": "palette-classic" },
              "noValue": "No sync failures"
            },
            "overrides": []
          },
          "options": {
            "tooltip": { "mode": "multi", "sort": "desc" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          }
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 16 },
          "id": 102,
          "title": "Kyverno",
          "type": "row"
        },
        {
          "id": 6,
          "title": "Policy Results",
          "type": "stat",
          "gridPos": { "h": 6, "w": 8, "x": 0, "y": 17 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "targets": [
            {
              "expr": "sum by (rule_result)(kyverno_policy_results_total)",
              "legendFormat": "{{rule_result}}",
              "refId": "A",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "fixed", "fixedColor": "text" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null }
                ]
              }
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "fail" },
                "properties": [
                  { "id": "color", "value": { "mode": "fixed", "fixedColor": "red" } }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "pass" },
                "properties": [
                  { "id": "color", "value": { "mode": "fixed", "fixedColor": "green" } }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "warn" },
                "properties": [
                  { "id": "color", "value": { "mode": "fixed", "fixedColor": "yellow" } }
                ]
              }
            ]
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "orientation": "horizontal",
            "textMode": "value_and_name",
            "colorMode": "background",
            "graphMode": "none"
          }
        },
        {
          "id": 7,
          "title": "Admission Requests",
          "type": "timeseries",
          "gridPos": { "h": 6, "w": 16, "x": 8, "y": 17 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "targets": [
            {
              "expr": "sum by (action)(rate(kyverno_admission_requests_total[5m]))",
              "legendFormat": "{{action}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth",
                "fillOpacity": 15,
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "auto",
                "spanNulls": false,
                "stacking": { "mode": "none" },
                "gradientMode": "scheme"
              },
              "color": { "mode": "palette-classic" },
              "unit": "reqps"
            },
            "overrides": []
          },
          "options": {
            "tooltip": { "mode": "multi", "sort": "desc" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          }
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 23 },
          "id": 103,
          "title": "External Services",
          "type": "row"
        },
        {
          "id": 8,
          "title": "Vault Seal Status",
          "type": "stat",
          "gridPos": { "h": 6, "w": 4, "x": 0, "y": 24 },
          "datasource": { "type": "prometheus", "uid": "P660CC246A1C19F5F" },
          "targets": [
            {
              "expr": "vault_core_unsealed",
              "legendFormat": "Vault",
              "refId": "A",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "mappings": [
                { "type": "value", "options": { "1": { "text": "Unsealed", "color": "green" }, "0": { "text": "SEALED", "color": "red" } } }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "green", "value": 1 }
                ]
              },
              "color": { "mode": "thresholds" },
              "noValue": "No Data"
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none"
          }
        },
        {
          "id": 9,
          "title": "HAProxy Backends",
          "type": "table",
          "gridPos": { "h": 6, "w": 10, "x": 4, "y": 24 },
          "datasource": { "type": "prometheus", "uid": "P660CC246A1C19F5F" },
          "targets": [
            {
              "expr": "haproxy_server_status",
              "legendFormat": "",
              "refId": "A",
              "instant": true,
              "format": "table"
            },
            {
              "expr": "haproxy_server_check_duration_seconds",
              "legendFormat": "",
              "refId": "B",
              "instant": true,
              "format": "table"
            }
          ],
          "fieldConfig": {
            "defaults": {},
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Value #A" },
                "properties": [
                  { "id": "displayName", "value": "Status" },
                  { "id": "custom.displayMode", "value": "color-background" },
                  {
                    "id": "mappings",
                    "value": [
                      { "type": "value", "options": { "1": { "text": "UP", "color": "green" }, "0": { "text": "DOWN", "color": "red" } } }
                    ]
                  }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "Value #B" },
                "properties": [
                  { "id": "displayName", "value": "Check Duration" },
                  { "id": "unit", "value": "s" }
                ]
              }
            ]
          },
          "options": {
            "showHeader": true,
            "sortBy": [{ "displayName": "server", "desc": false }]
          },
          "transformations": [
            {
              "id": "merge",
              "options": {}
            },
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "Time": true,
                  "__name__": true,
                  "instance": true,
                  "job": true
                },
                "renameByName": {
                  "proxy": "Backend",
                  "server": "Server"
                }
              }
            }
          ]
        },
        {
          "id": 10,
          "title": "Traefik Requests",
          "type": "timeseries",
          "gridPos": { "h": 6, "w": 10, "x": 14, "y": 24 },
          "datasource": { "type": "prometheus", "uid": "P660CC246A1C19F5F" },
          "targets": [
            {
              "expr": "sum by (entrypoint)(rate(traefik_entrypoint_requests_total[5m]))",
              "legendFormat": "{{entrypoint}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth",
                "fillOpacity": 15,
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "auto",
                "spanNulls": false,
                "stacking": { "mode": "none" },
                "gradientMode": "scheme"
              },
              "color": { "mode": "palette-classic" },
              "unit": "reqps"
            },
            "overrides": []
          },
          "options": {
            "tooltip": { "mode": "multi", "sort": "desc" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          }
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "tags": ["sentinel", "overview"],
      "templating": {
        "list": []
      },
      "time": { "from": "now-1h", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "Platform Overview",
      "uid": "platform-overview",
      "version": 1
    }
