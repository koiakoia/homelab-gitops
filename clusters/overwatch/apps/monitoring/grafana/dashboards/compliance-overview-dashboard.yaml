apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-compliance-overview
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    argocd.argoproj.io/sync-options: ServerSideApply=true
data:
  compliance-overview.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": { "type": "grafana", "uid": "-- Grafana --" },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "id": 100,
          "title": "GitOps Compliance (CM-3, CM-6)",
          "type": "row"
        },
        {
          "id": 1,
          "title": "ArgoCD Apps Synced",
          "type": "stat",
          "gridPos": { "h": 5, "w": 4, "x": 0, "y": 1 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "targets": [
            {
              "expr": "count(argocd_app_info{sync_status=\"Synced\"})",
              "legendFormat": "Synced",
              "refId": "A",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 15 },
                  { "color": "green", "value": 18 }
                ]
              },
              "color": { "mode": "thresholds" },
              "noValue": "0",
              "unit": "none"
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "orientation": "auto",
            "textMode": "value",
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center"
          }
        },
        {
          "id": 2,
          "title": "ArgoCD Apps Healthy",
          "type": "stat",
          "gridPos": { "h": 5, "w": 4, "x": 4, "y": 1 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "targets": [
            {
              "expr": "count(argocd_app_info{health_status=\"Healthy\"})",
              "legendFormat": "Healthy",
              "refId": "A",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 14 },
                  { "color": "green", "value": 16 }
                ]
              },
              "color": { "mode": "thresholds" },
              "noValue": "0"
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "orientation": "auto",
            "textMode": "value",
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center"
          }
        },
        {
          "id": 3,
          "title": "Apps Out of Sync",
          "type": "stat",
          "gridPos": { "h": 5, "w": 4, "x": 8, "y": 1 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "targets": [
            {
              "expr": "count(argocd_app_info{sync_status!=\"Synced\"}) OR on() vector(0)",
              "legendFormat": "Out of Sync",
              "refId": "A",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1 },
                  { "color": "red", "value": 5 }
                ]
              },
              "color": { "mode": "thresholds" },
              "noValue": "0"
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "orientation": "auto",
            "textMode": "value",
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center"
          }
        },
        {
          "id": 4,
          "title": "ArgoCD Application Status",
          "type": "table",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 1 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "targets": [
            {
              "expr": "argocd_app_info",
              "legendFormat": "",
              "refId": "A",
              "instant": true,
              "format": "table"
            }
          ],
          "transformations": [
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "Time": true,
                  "Value": true,
                  "__name__": true,
                  "container": true,
                  "endpoint": true,
                  "instance": true,
                  "job": true,
                  "namespace": true,
                  "pod": true,
                  "project": true,
                  "service": true,
                  "autosync_enabled": true,
                  "repo": true
                },
                "indexByName": {
                  "name": 0,
                  "dest_namespace": 1,
                  "sync_status": 2,
                  "health_status": 3
                },
                "renameByName": {
                  "name": "Application",
                  "dest_namespace": "Namespace",
                  "sync_status": "Sync",
                  "health_status": "Health"
                }
              }
            }
          ],
          "fieldConfig": {
            "defaults": {},
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Sync" },
                "properties": [
                  {
                    "id": "custom.cellOptions",
                    "value": { "type": "color-text" }
                  },
                  {
                    "id": "mappings",
                    "value": [
                      { "type": "value", "options": { "Synced": { "color": "green", "index": 0, "text": "Synced" }, "OutOfSync": { "color": "orange", "index": 1, "text": "OutOfSync" } } }
                    ]
                  }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "Health" },
                "properties": [
                  {
                    "id": "custom.cellOptions",
                    "value": { "type": "color-text" }
                  },
                  {
                    "id": "mappings",
                    "value": [
                      { "type": "value", "options": { "Healthy": { "color": "green", "index": 0, "text": "Healthy" }, "Degraded": { "color": "red", "index": 1, "text": "Degraded" }, "Progressing": { "color": "yellow", "index": 2, "text": "Progressing" }, "Missing": { "color": "red", "index": 3, "text": "Missing" } } }
                    ]
                  }
                ]
              }
            ]
          },
          "options": {
            "showHeader": true,
            "sortBy": [{ "displayName": "Sync", "desc": true }],
            "cellHeight": "sm"
          }
        },
        {
          "id": 5,
          "title": "Sync Operations (rate)",
          "type": "timeseries",
          "gridPos": { "h": 5, "w": 12, "x": 0, "y": 6 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "targets": [
            {
              "expr": "sum by (phase)(rate(argocd_app_sync_total[15m]))",
              "legendFormat": "{{phase}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth",
                "fillOpacity": 15,
                "lineWidth": 2,
                "showPoints": "never",
                "spanNulls": true
              },
              "color": { "mode": "palette-classic" },
              "unit": "ops"
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "desc" }
          }
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 11 },
          "id": 101,
          "title": "Admission Policy Enforcement (CM-7, SI-7)",
          "type": "row"
        },
        {
          "id": 10,
          "title": "Total Kyverno Violations",
          "type": "stat",
          "gridPos": { "h": 5, "w": 4, "x": 0, "y": 12 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "targets": [
            {
              "expr": "sum(kyverno_policy_results_total{rule_result=\"fail\"})",
              "legendFormat": "Violations",
              "refId": "A",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1 },
                  { "color": "red", "value": 50 }
                ]
              },
              "color": { "mode": "thresholds" },
              "noValue": "0"
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "orientation": "auto",
            "textMode": "value",
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center"
          }
        },
        {
          "id": 11,
          "title": "Admission Denials",
          "type": "stat",
          "gridPos": { "h": 5, "w": 4, "x": 4, "y": 12 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "targets": [
            {
              "expr": "sum(kyverno_admission_requests_total{allowed=\"false\"}) OR on() vector(0)",
              "legendFormat": "Denied",
              "refId": "A",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1 },
                  { "color": "red", "value": 10 }
                ]
              },
              "color": { "mode": "thresholds" },
              "noValue": "0"
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "orientation": "auto",
            "textMode": "value",
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center"
          }
        },
        {
          "id": 12,
          "title": "Active Policy Rules",
          "type": "stat",
          "gridPos": { "h": 5, "w": 4, "x": 8, "y": 12 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "targets": [
            {
              "expr": "count(kyverno_policy_rule_info_total)",
              "legendFormat": "Rules",
              "refId": "A",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 4 },
                  { "color": "green", "value": 6 }
                ]
              },
              "color": { "mode": "thresholds" },
              "noValue": "0"
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "orientation": "auto",
            "textMode": "value",
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center"
          }
        },
        {
          "id": 13,
          "title": "Violations by Policy",
          "type": "bargauge",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 12 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "targets": [
            {
              "expr": "sum by (policy_name)(kyverno_policy_results_total{rule_result=\"fail\"})",
              "legendFormat": "{{policy_name}}",
              "refId": "A",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 10 },
                  { "color": "red", "value": 50 }
                ]
              },
              "color": { "mode": "thresholds" }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "orientation": "horizontal",
            "displayMode": "gradient",
            "showUnfilled": true,
            "minVizWidth": 0,
            "minVizHeight": 10
          }
        },
        {
          "id": 14,
          "title": "Policy Results Over Time",
          "type": "timeseries",
          "gridPos": { "h": 5, "w": 12, "x": 0, "y": 17 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "targets": [
            {
              "expr": "sum by (rule_result)(rate(kyverno_policy_results_total[5m]))",
              "legendFormat": "{{rule_result}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth",
                "fillOpacity": 15,
                "lineWidth": 2,
                "showPoints": "never",
                "spanNulls": true
              },
              "color": { "mode": "palette-classic" },
              "unit": "ops"
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "pass" },
                "properties": [{ "id": "color", "value": { "fixedColor": "green", "mode": "fixed" } }]
              },
              {
                "matcher": { "id": "byName", "options": "fail" },
                "properties": [{ "id": "color", "value": { "fixedColor": "red", "mode": "fixed" } }]
              }
            ]
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "desc" }
          }
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 22 },
          "id": 102,
          "title": "Transmission Security (SC-8, SC-13)",
          "type": "row"
        },
        {
          "id": 20,
          "title": "mTLS Request Rate",
          "type": "stat",
          "gridPos": { "h": 5, "w": 6, "x": 0, "y": 23 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "targets": [
            {
              "expr": "sum(rate(istio_requests_total{connection_security_policy=\"mutual_tls\"}[5m]))",
              "legendFormat": "mTLS req/s",
              "refId": "A",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "green", "value": 0 }
                ]
              },
              "color": { "mode": "thresholds" },
              "noValue": "0",
              "unit": "reqps"
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "orientation": "auto",
            "textMode": "value_and_name",
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "center"
          }
        },
        {
          "id": 21,
          "title": "Non-mTLS Requests (should be 0)",
          "type": "stat",
          "gridPos": { "h": 5, "w": 6, "x": 6, "y": 23 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "targets": [
            {
              "expr": "sum(rate(istio_requests_total{connection_security_policy!=\"mutual_tls\",connection_security_policy!=\"\"}[5m])) OR on() vector(0)",
              "legendFormat": "Non-mTLS req/s",
              "refId": "A",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 0.001 }
                ]
              },
              "color": { "mode": "thresholds" },
              "noValue": "0",
              "unit": "reqps"
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "orientation": "auto",
            "textMode": "value_and_name",
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center"
          }
        },
        {
          "id": 22,
          "title": "mTLS Traffic Over Time",
          "type": "timeseries",
          "gridPos": { "h": 7, "w": 12, "x": 12, "y": 23 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "targets": [
            {
              "expr": "sum(rate(istio_requests_total{connection_security_policy=\"mutual_tls\"}[5m]))",
              "legendFormat": "mTLS",
              "refId": "A"
            },
            {
              "expr": "sum(rate(istio_requests_total{connection_security_policy!=\"mutual_tls\",connection_security_policy!=\"\"}[5m]))",
              "legendFormat": "Plaintext",
              "refId": "B"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth",
                "fillOpacity": 20,
                "lineWidth": 2,
                "showPoints": "never",
                "spanNulls": true
              },
              "color": { "mode": "palette-classic" },
              "unit": "reqps"
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "mTLS" },
                "properties": [{ "id": "color", "value": { "fixedColor": "green", "mode": "fixed" } }]
              },
              {
                "matcher": { "id": "byName", "options": "Plaintext" },
                "properties": [{ "id": "color", "value": { "fixedColor": "red", "mode": "fixed" } }]
              }
            ]
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "desc" }
          }
        },
        {
          "id": 23,
          "title": "Istio Mesh Request Errors",
          "type": "timeseries",
          "gridPos": { "h": 7, "w": 12, "x": 0, "y": 28 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "targets": [
            {
              "expr": "sum by (response_code)(rate(istio_requests_total{response_code=~\"5.*\"}[5m]))",
              "legendFormat": "{{response_code}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "bars",
                "fillOpacity": 50,
                "lineWidth": 1,
                "showPoints": "never"
              },
              "color": { "fixedColor": "red", "mode": "fixed" },
              "unit": "reqps"
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "desc" }
          }
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 35 },
          "id": 103,
          "title": "Runtime Threat Detection (SI-4)",
          "type": "row"
        },
        {
          "id": 30,
          "title": "Falco Pods Running",
          "type": "stat",
          "gridPos": { "h": 5, "w": 4, "x": 0, "y": 36 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "targets": [
            {
              "expr": "count(kube_pod_status_phase{namespace=\"falco-system\",phase=\"Running\"}) OR on() vector(0)",
              "legendFormat": "Falco Pods",
              "refId": "A",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 2 },
                  { "color": "green", "value": 3 }
                ]
              },
              "color": { "mode": "thresholds" },
              "noValue": "0"
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "orientation": "auto",
            "textMode": "value_and_name",
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center"
          }
        },
        {
          "id": 31,
          "title": "Falco Kernel Events Total",
          "description": "Total syscall events processed by Falco. Requires Falco metrics endpoint to be scraped (NetworkPolicy fix pending).",
          "type": "stat",
          "gridPos": { "h": 5, "w": 4, "x": 4, "y": 36 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "targets": [
            {
              "expr": "sum(falcosecurity_scap_engine_events_total) OR on() vector(0)",
              "legendFormat": "Kernel Events",
              "refId": "A",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "yellow", "value": null },
                  { "color": "green", "value": 1 }
                ]
              },
              "color": { "mode": "thresholds" },
              "noValue": "Awaiting metrics",
              "unit": "short"
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "orientation": "auto",
            "textMode": "value_and_name",
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "center"
          }
        },
        {
          "id": 32,
          "title": "Falco Event Drop Rate",
          "description": "Percentage of syscall events dropped by Falco kernel buffer. Should be near 0%.",
          "type": "gauge",
          "gridPos": { "h": 5, "w": 4, "x": 8, "y": 36 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "targets": [
            {
              "expr": "sum(falcosecurity_scap_n_drops_buffer_total) / (sum(falcosecurity_scap_engine_events_total) + 1) * 100",
              "legendFormat": "Drop %",
              "refId": "A",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.1 },
                  { "color": "red", "value": 1 }
                ]
              },
              "color": { "mode": "thresholds" },
              "noValue": "N/A",
              "unit": "percent",
              "min": 0,
              "max": 5
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "showThresholdLabels": false,
            "showThresholdMarkers": true
          }
        },
        {
          "id": 33,
          "title": "Falco Resource Usage",
          "type": "timeseries",
          "gridPos": { "h": 7, "w": 12, "x": 12, "y": 36 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "targets": [
            {
