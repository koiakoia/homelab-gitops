apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-security-posture
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    argocd.argoproj.io/sync-options: ServerSideApply=true
data:
  security-posture.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": { "type": "grafana", "uid": "-- Grafana --" },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "id": 100,
          "title": "Kyverno Policy Enforcement",
          "type": "row"
        },
        {
          "id": 1,
          "title": "Policy Violations",
          "type": "stat",
          "gridPos": { "h": 6, "w": 6, "x": 0, "y": 1 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "targets": [
            {
              "expr": "sum(kyverno_policy_results_total{rule_result=\"fail\"})",
              "legendFormat": "Violations",
              "refId": "A",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1 },
                  { "color": "red", "value": 10 }
                ]
              },
              "color": { "mode": "thresholds" },
              "noValue": "0"
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "orientation": "auto",
            "textMode": "value_and_name",
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "center"
          }
        },
        {
          "id": 2,
          "title": "Policy Results Over Time",
          "type": "timeseries",
          "gridPos": { "h": 6, "w": 12, "x": 6, "y": 1 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "targets": [
            {
              "expr": "sum by (rule_result)(rate(kyverno_policy_results_total[5m]))",
              "legendFormat": "{{rule_result}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth",
                "fillOpacity": 20,
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "auto",
                "spanNulls": false,
                "stacking": { "mode": "normal" },
                "gradientMode": "scheme"
              },
              "color": { "mode": "palette-classic" },
              "unit": "ops"
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "fail" },
                "properties": [
                  { "id": "color", "value": { "mode": "fixed", "fixedColor": "red" } }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "pass" },
                "properties": [
                  { "id": "color", "value": { "mode": "fixed", "fixedColor": "green" } }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "warn" },
                "properties": [
                  { "id": "color", "value": { "mode": "fixed", "fixedColor": "yellow" } }
                ]
              }
            ]
          },
          "options": {
            "tooltip": { "mode": "multi", "sort": "desc" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          }
        },
        {
          "id": 3,
          "title": "Admission Denials",
          "type": "stat",
          "gridPos": { "h": 6, "w": 6, "x": 18, "y": 1 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "targets": [
            {
              "expr": "sum(kyverno_admission_requests_total{allowed=\"false\"})",
              "legendFormat": "Denied",
              "refId": "A",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "orange", "value": 1 },
                  { "color": "red", "value": 50 }
                ]
              },
              "color": { "mode": "thresholds" },
              "noValue": "0"
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "orientation": "auto",
            "textMode": "value_and_name",
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "center"
          }
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 7 },
          "id": 101,
          "title": "ArgoCD Drift Detection",
          "type": "row"
        },
        {
          "id": 4,
          "title": "Apps Out of Sync",
          "type": "stat",
          "gridPos": { "h": 6, "w": 6, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "targets": [
            {
              "expr": "count(argocd_app_info{sync_status!=\"Synced\"}) OR on() vector(0)",
              "legendFormat": "Out of Sync",
              "refId": "A",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 1 }
                ]
              },
              "color": { "mode": "thresholds" },
              "noValue": "0"
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "orientation": "auto",
            "textMode": "value_and_name",
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center"
          }
        },
        {
          "id": 5,
          "title": "Sync History",
          "type": "timeseries",
          "gridPos": { "h": 6, "w": 18, "x": 6, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "targets": [
            {
              "expr": "sum by (phase)(rate(argocd_app_sync_total[5m]))",
              "legendFormat": "{{phase}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth",
                "fillOpacity": 20,
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "auto",
                "spanNulls": false,
                "stacking": { "mode": "none" },
                "gradientMode": "scheme"
              },
              "color": { "mode": "palette-classic" },
              "unit": "ops"
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Succeeded" },
                "properties": [
                  { "id": "color", "value": { "mode": "fixed", "fixedColor": "green" } }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "Error" },
                "properties": [
                  { "id": "color", "value": { "mode": "fixed", "fixedColor": "red" } }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "Failed" },
                "properties": [
                  { "id": "color", "value": { "mode": "fixed", "fixedColor": "red" } }
                ]
              }
            ]
          },
          "options": {
            "tooltip": { "mode": "multi", "sort": "desc" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          }
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 14 },
          "id": 102,
          "title": "External Security",
          "type": "row"
        },
        {
          "id": 6,
          "title": "Wazuh Critical CVEs",
          "type": "stat",
          "gridPos": { "h": 5, "w": 4, "x": 0, "y": 15 },
          "datasource": { "type": "prometheus", "uid": "P660CC246A1C19F5F" },
          "targets": [
            {
              "expr": "wazuh_vulnerabilities_total{severity=\"Critical\"}",
              "legendFormat": "Critical",
              "refId": "A",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 1 }
                ]
              },
              "color": { "mode": "thresholds" },
              "noValue": "0"
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "orientation": "auto",
            "textMode": "value_and_name",
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center"
          }
        },
        {
          "id": 8,
          "title": "Wazuh Total Vulnerabilities",
          "type": "stat",
          "gridPos": { "h": 5, "w": 4, "x": 4, "y": 15 },
          "datasource": { "type": "prometheus", "uid": "P660CC246A1C19F5F" },
          "targets": [
            {
              "expr": "wazuh_vulnerabilities_grand_total",
              "legendFormat": "Total",
              "refId": "A",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 5000 },
                  { "color": "red", "value": 25000 }
                ]
              },
              "color": { "mode": "thresholds" },
              "noValue": "N/A"
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "orientation": "auto",
            "textMode": "value_and_name",
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center"
          }
        },
        {
          "id": 9,
          "title": "Wazuh Vuln Severity Breakdown",
          "type": "piechart",
          "gridPos": { "h": 5, "w": 4, "x": 8, "y": 15 },
          "datasource": { "type": "prometheus", "uid": "P660CC246A1C19F5F" },
          "targets": [
            {
              "expr": "wazuh_vulnerabilities_total",
              "legendFormat": "{{severity}}",
              "refId": "A",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" }
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Critical" },
                "properties": [
                  { "id": "color", "value": { "mode": "fixed", "fixedColor": "red" } }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "High" },
                "properties": [
                  { "id": "color", "value": { "mode": "fixed", "fixedColor": "orange" } }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "Medium" },
                "properties": [
                  { "id": "color", "value": { "mode": "fixed", "fixedColor": "yellow" } }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "Low" },
                "properties": [
                  { "id": "color", "value": { "mode": "fixed", "fixedColor": "blue" } }
                ]
              }
            ]
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "pieType": "donut",
            "tooltip": { "mode": "multi" },
            "legend": { "displayMode": "list", "placement": "right", "values": ["value"] }
          }
        },
        {
          "id": 7,
          "title": "CrowdSec Status",
          "type": "text",
          "gridPos": { "h": 5, "w": 12, "x": 12, "y": 15 },
          "options": {
            "mode": "markdown",
            "content": "### CrowdSec IPS\n\n**Deployed** on pangolin-proxy (v1.7.6)\n\n- **Bouncer**: iptables firewall bouncer (active)\n- **Collections**: traefik, sshd, linux, http-cve, auditd, postfix\n- **Metrics**: Prometheus exporter on :6060",
            "code": { "language": "plaintext", "showLineNumbers": false, "showMiniMap": false }
          }
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "tags": ["sentinel", "security"],
      "templating": {
        "list": []
      },
      "time": { "from": "now-1h", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "Security Posture",
      "uid": "security-posture",
      "version": 1
    }
