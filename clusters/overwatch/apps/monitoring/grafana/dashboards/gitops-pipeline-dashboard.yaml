apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-gitops-pipeline
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    argocd.argoproj.io/sync-options: ServerSideApply=true
data:
  gitops-pipeline.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": "-- Grafana --",
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "id": 100,
          "title": "ArgoCD Applications",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "align": "auto",
                "displayMode": "auto"
              }
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "sync_status" },
                "properties": [
                  {
                    "id": "custom.displayMode",
                    "value": "color-text"
                  },
                  {
                    "id": "mappings",
                    "value": [
                      { "options": { "Synced": { "color": "green", "index": 0, "text": "Synced" } }, "type": "value" },
                      { "options": { "OutOfSync": { "color": "yellow", "index": 1, "text": "OutOfSync" } }, "type": "value" },
                      { "options": { "Unknown": { "color": "red", "index": 2, "text": "Unknown" } }, "type": "value" }
                    ]
                  }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "health_status" },
                "properties": [
                  {
                    "id": "custom.displayMode",
                    "value": "color-text"
                  },
                  {
                    "id": "mappings",
                    "value": [
                      { "options": { "Healthy": { "color": "green", "index": 0, "text": "Healthy" } }, "type": "value" },
                      { "options": { "Degraded": { "color": "red", "index": 1, "text": "Degraded" } }, "type": "value" },
                      { "options": { "Progressing": { "color": "blue", "index": 2, "text": "Progressing" } }, "type": "value" },
                      { "options": { "Missing": { "color": "orange", "index": 3, "text": "Missing" } }, "type": "value" },
                      { "options": { "Suspended": { "color": "purple", "index": 4, "text": "Suspended" } }, "type": "value" },
                      { "options": { "Unknown": { "color": "red", "index": 5, "text": "Unknown" } }, "type": "value" }
                    ]
                  }
                ]
              }
            ]
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 1 },
          "id": 1,
          "options": {
            "showHeader": true,
            "sortBy": [{ "displayName": "name", "desc": false }]
          },
          "targets": [
            {
              "expr": "argocd_app_info",
              "format": "table",
              "instant": true,
              "refId": "A"
            }
          ],
          "title": "App Sync Status",
          "transformations": [
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "Time": true,
                  "Value": true,
                  "__name__": true,
                  "container": true,
                  "endpoint": true,
                  "instance": true,
                  "job": true,
                  "namespace": true,
                  "pod": true,
                  "service": true,
                  "dest_namespace": true,
                  "dest_server": true,
                  "operation": true,
                  "repo": true
                },
                "renameByName": {
                  "name": "Application",
                  "project": "Project",
                  "sync_status": "Sync Status",
                  "health_status": "Health Status"
                }
              }
            }
          ],
          "type": "table"
        },
        {
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 10,
                "lineWidth": 1,
                "pointSize": 5,
                "showPoints": "auto",
                "spanNulls": false
              },
              "unit": "s"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 1 },
          "id": 2,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "targets": [
            {
              "expr": "argocd_app_sync_duration_seconds{phase=\"Succeeded\"}",
              "legendFormat": "{{name}}",
              "refId": "A"
            }
          ],
          "title": "Sync Duration",
          "type": "timeseries"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 9 },
          "id": 101,
          "title": "Operations",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 20,
                "lineWidth": 1,
                "pointSize": 5,
                "showPoints": "never",
                "spanNulls": false,
                "stacking": { "mode": "normal" }
              },
              "unit": "ops"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 10 },
          "id": 3,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "targets": [
            {
              "expr": "sum by (phase)(rate(argocd_app_sync_total[5m]))",
              "legendFormat": "{{phase}}",
              "refId": "A"
            }
          ],
          "title": "Sync Total by Phase",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 10,
                "lineWidth": 1,
                "pointSize": 5,
                "showPoints": "never",
                "spanNulls": false
              },
              "unit": "reqps"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 10 },
          "id": 4,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "targets": [
            {
              "expr": "rate(argocd_git_request_duration_seconds_count[5m])",
              "legendFormat": "{{request_type}}",
              "refId": "A"
            }
          ],
          "title": "Git Request Rate",
          "type": "timeseries"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 18 },
          "id": 102,
          "title": "Performance",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 10,
                "lineWidth": 1,
                "pointSize": 5,
                "showPoints": "never",
                "spanNulls": false
              },
              "unit": "s"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 19 },
          "id": 5,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum by (le, request_type)(rate(argocd_git_request_duration_seconds_bucket[5m])))",
              "legendFormat": "p95 {{request_type}}",
              "refId": "A"
            }
          ],
          "title": "Git Request Duration (p95)",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 10,
                "lineWidth": 1,
                "pointSize": 5,
                "showPoints": "never",
                "spanNulls": false
              },
              "unit": "s"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 19 },
          "id": 6,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum by (le)(rate(argocd_app_reconcile_duration_seconds_bucket[5m])))",
              "legendFormat": "p95 reconciliation",
              "refId": "A"
            }
          ],
          "title": "Reconciliation Duration (p95)",
          "type": "timeseries"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 38,
      "style": "dark",
      "tags": ["sentinel", "gitops"],
      "templating": {
        "list": [
          {
            "current": { "selected": false, "text": "Prometheus", "value": "Prometheus" },
            "hide": 2,
            "includeAll": false,
            "name": "DS_PROMETHEUS",
            "options": [],
            "query": "prometheus",
            "type": "datasource"
          }
        ]
      },
      "time": { "from": "now-6h", "to": "now" },
      "title": "GitOps Pipeline",
      "uid": "gitops-pipeline",
      "version": 1
    }
