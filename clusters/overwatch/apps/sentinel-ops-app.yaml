apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sentinel-ops
  namespace: openshift-gitops
spec:
  project: default
  source:
    repoURL: http://${GITLAB_IP}/${GITLAB_NAMESPACE}/overwatch-gitops.git
    targetRevision: main
    path: apps/sentinel-ops
  destination:
    server: https://kubernetes.default.svc
    namespace: sentinel-ops
  ignoreDifferences:
    - group: external-secrets.io
      kind: ExternalSecret
      jqPathExpressions:
        - .spec.data[]?.remoteRef
        - .spec.target
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
