apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: plane
  namespace: openshift-gitops
spec:
  project: default
  sources:
    - repoURL: https://helm.plane.so/
      chart: plane-ce
      targetRevision: 1.4.1
      helm:
        releaseName: plane
        valueFiles:
          - $values/clusters/overwatch/apps/plane/values.yaml
    - repoURL: http://${GITLAB_IP}/${GITLAB_NAMESPACE}/overwatch-gitops.git
      targetRevision: main
      ref: values
    - repoURL: http://${GITLAB_IP}/${GITLAB_NAMESPACE}/overwatch-gitops.git
      targetRevision: main
      path: apps/plane
  destination:
    server: https://kubernetes.default.svc
    namespace: plane
  ignoreDifferences:
    - group: external-secrets.io
      kind: ExternalSecret
      jqPathExpressions:
        - .spec.data[]?.remoteRef
        - .spec.target
    - group: apps
      kind: Deployment
      name: plane-api-wl
      jqPathExpressions:
        - .spec.template.spec.volumes
        - .spec.template.spec.containers[].volumeMounts
        - .spec.template.spec.containers[].envFrom
    - group: apps
      kind: Deployment
      name: plane-worker-wl
      jqPathExpressions:
        - .spec.template.spec.volumes
        - .spec.template.spec.containers[].volumeMounts
        - .spec.template.spec.containers[].envFrom
    - group: apps
      kind: Deployment
      name: plane-beat-worker-wl
      jqPathExpressions:
        - .spec.template.spec.volumes
        - .spec.template.spec.containers[].volumeMounts
        - .spec.template.spec.containers[].envFrom
    - group: batch
      kind: Job
      jqPathExpressions:
        - .spec.template
    - kind: ConfigMap
      name: plane-app-vars
      jqPathExpressions:
        - .data.WEB_URL
        - .data.CORS_ALLOWED_ORIGINS
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
