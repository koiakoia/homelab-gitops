    - ./backstage-catalog/infrastructure/proxmox-cluster.yaml
    - ./backstage-catalog/infrastructure/iac-control.yaml
    - ./backstage-catalog/infrastructure/config-server.yaml
    - ./backstage-catalog/infrastructure/seedbox-vm.yaml
    - ./backstage-catalog/infrastructure/unifi-controller.yaml
---
apiVersion: backstage.io/v1alpha1
kind: Location
metadata:
  name: sentinel-org-catalog
  description: Organization entities (Users, Groups)
spec:
  type: url
  targets:
    - ./backstage-catalog/org/users.yaml
    - ./backstage-catalog/org/groups.yaml
