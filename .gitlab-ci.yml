# overwatch-gitops CI/CD - validation only (ArgoCD handles deployments)
---
stages:
  - lint
  - security-scan

yamllint:
  stage: lint
  tags:
    - iac
  script:
    - echo "Running yamllint on all YAML files..."
    - yamllint -c .yamllint.yml -f parsable . | tee yamllint-report.txt
  artifacts:
    when: always
    paths:
      - yamllint-report.txt
    expire_in: 30 days
  allow_failure: false
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

trivy-config:
  stage: security-scan
  tags:
    - iac
  script:
    - echo "Running Trivy K8s manifest scan..."
    - trivy fs --scanners misconfig --format json --output trivy-k8s-report.json .
    - echo "Summary:"
    - trivy fs --scanners misconfig --severity HIGH,CRITICAL .
  artifacts:
    when: always
    paths:
      - trivy-k8s-report.json
    expire_in: 30 days
  allow_failure: false
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

gitleaks:
  stage: security-scan
  tags:
    - iac
  script:
    - echo "Running gitleaks secret detection..."
    - gitleaks detect --source . --report-format json --report-path gitleaks-report.json --no-git
    - echo "No secrets detected."
  artifacts:
    when: always
    paths:
      - gitleaks-report.json
    expire_in: 30 days
  allow_failure: false
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

checkov:
  stage: security-scan
  tags:
    - iac
  script:
    - echo "Running Checkov Kubernetes security scan..."
    - checkov --framework kubernetes helm -d . --output json --output-file-path . --hard-fail-on CRITICAL,HIGH
    - mv results_json.json checkov-k8s-report.json 2>/dev/null || echo '{"results":{"failed_checks":[]}}' > checkov-k8s-report.json
    - echo "Summary:"
    - checkov --framework kubernetes helm -d . --compact --quiet || true
  artifacts:
    when: always
    paths:
      - checkov-k8s-report.json
    expire_in: 30 days
  allow_failure: false
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

# =============================================================================
# DefectDojo - Upload scan results (after security-scan stage)
# Uses reimport-scan with auto_create_context to deduplicate findings across
# pipeline runs. Product "Overwatch GitOps" separates findings from sentinel-iac.
# =============================================================================
upload-trivy-to-defectdojo:
  stage: security-scan
  tags:
    - iac
  needs:
    - job: trivy-config
      artifacts: true
  allow_failure: true
  script:
    - |
      if [ ! -f trivy-k8s-report.json ]; then
        echo "No trivy-k8s-report.json found, skipping"
        exit 0
      fi
      echo "Uploading Trivy K8s scan to DefectDojo..."
      RESPONSE=$(curl -sk -X POST "${DEFECTDOJO_URL}/api/v2/reimport-scan/" \
        -H "Authorization: Token ${DEFECTDOJO_API_KEY}" \
        -F "scan_type=Trivy Scan" \
        -F "product_name=Overwatch GitOps" \
        -F "engagement_name=Main Branch CI/CD" \
        -F "test_title=Trivy K8s Misconfig" \
        -F "auto_create_context=true" \
        -F "file=@trivy-k8s-report.json" \
        -F "active=true" \
        -F "verified=false" \
        -F "close_old_findings=true" \
        -F "minimum_severity=Info" \
        -F "scan_date=$(date +%Y-%m-%d)" \
        -F "tags=trivy,k8s,gitops" \
        -w "\n%{http_code}")
      HTTP_CODE=$(echo "$RESPONSE" | tail -1)
      echo "HTTP Status: $HTTP_CODE"
      if [ "$HTTP_CODE" -ge 400 ]; then
        echo "Upload failed: $(echo "$RESPONSE" | head -1)"
        exit 1
      fi
      echo "Trivy scan uploaded successfully"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

upload-gitleaks-to-defectdojo:
  stage: security-scan
  tags:
    - iac
  needs:
    - job: gitleaks
      artifacts: true
  allow_failure: true
  script:
    - |
      if [ ! -f gitleaks-report.json ]; then
        echo "No gitleaks-report.json found, skipping"
        exit 0
      fi
      echo "Uploading Gitleaks scan to DefectDojo..."
      RESPONSE=$(curl -sk -X POST "${DEFECTDOJO_URL}/api/v2/reimport-scan/" \
        -H "Authorization: Token ${DEFECTDOJO_API_KEY}" \
        -F "scan_type=Gitleaks Scan" \
        -F "product_name=Overwatch GitOps" \
        -F "engagement_name=Main Branch CI/CD" \
        -F "test_title=Gitleaks Secret Detection" \
        -F "auto_create_context=true" \
        -F "file=@gitleaks-report.json" \
        -F "active=true" \
        -F "verified=false" \
        -F "close_old_findings=true" \
        -F "minimum_severity=Info" \
        -F "scan_date=$(date +%Y-%m-%d)" \
        -F "tags=gitleaks,secrets,gitops" \
        -w "\n%{http_code}")
      HTTP_CODE=$(echo "$RESPONSE" | tail -1)
      echo "HTTP Status: $HTTP_CODE"
      if [ "$HTTP_CODE" -ge 400 ]; then
        echo "Upload failed: $(echo "$RESPONSE" | head -1)"
        exit 1
      fi
      echo "Gitleaks scan uploaded successfully"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

upload-checkov-to-defectdojo:
  stage: security-scan
  tags:
    - iac
  needs:
    - job: checkov
      artifacts: true
  allow_failure: true
  script:
    - |
      if [ ! -f checkov-k8s-report.json ]; then
        echo "No checkov-k8s-report.json found, skipping"
        exit 0
      fi
      echo "Uploading Checkov K8s scan to DefectDojo..."
      RESPONSE=$(curl -sk -X POST "${DEFECTDOJO_URL}/api/v2/reimport-scan/" \
        -H "Authorization: Token ${DEFECTDOJO_API_KEY}" \
        -F "scan_type=Checkov Scan" \
        -F "product_name=Overwatch GitOps" \
        -F "engagement_name=Main Branch CI/CD" \
        -F "test_title=Checkov K8s Analysis" \
        -F "auto_create_context=true" \
        -F "file=@checkov-k8s-report.json" \
        -F "active=true" \
        -F "verified=false" \
        -F "close_old_findings=true" \
        -F "minimum_severity=Info" \
        -F "scan_date=$(date +%Y-%m-%d)" \
        -F "tags=checkov,k8s,gitops" \
        -w "\n%{http_code}")
      HTTP_CODE=$(echo "$RESPONSE" | tail -1)
      echo "HTTP Status: $HTTP_CODE"
      if [ "$HTTP_CODE" -ge 400 ]; then
        echo "Upload failed: $(echo "$RESPONSE" | head -1)"
        exit 1
      fi
      echo "Checkov scan uploaded successfully"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
